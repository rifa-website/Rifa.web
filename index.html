<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Biodata</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #2b4dbf, #4f86f7);
}

.container {
    width: 100%;
    max-width: 400px;
}

.form {
    background: rgba(255, 255, 255, 0.1);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    color: white;
}

.form h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form label {
    display: block;
    margin: 10px 0 5px;
    font-size: 14px;
}

.form input,
.form textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
}

.form input::placeholder,
.form textarea::placeholder {
    color: #ddd;
}

.form button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #2b4dbf;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover {
    background: #ddd;
}
</style>

</head>
<body>

<div class="container">
    <form class="form" id="biodataForm">
        <h2>BIODATA FORM</h2>

        <label>👤 Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label>📧 Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>🎯 Hobby</label>
        <input type="text" id="hobby" placeholder="Enter your hobby">

        <label>🎂 Age</label>
        <input type="number" id="age" placeholder="Enter your age">

        <label>🏠 Address</label>
        <textarea id="address" placeholder="Enter your address"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
document.getElementById("biodataForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if(name === "" || email === "") {
        alert("Nama dan Email wajib diisi!");
        return;
    }

    alert("Data berhasil dikirim!");
});
</script>

</body>
</html>
